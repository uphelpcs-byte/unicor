<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>타사 이관 - 유니코 CS</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;background:#eef2f3;color:#1a2526;line-height:1.55}
.top{background:linear-gradient(135deg,#0D4A55,#2E8B9A);color:#fff;padding:26px 22px 18px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.wf-k{font-weight:700;color:#2E8B9A;white-space:nowrap;font-size:13px}.wf-v{font-size:13px}
.guide{background:#fff;border-radius:9px;padding:12px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.ccard-h{display:flex;align-items:center;gap:9px;padding:12px 15px;cursor:pointer}
.cnum{font-size:11px;font-weight:700;color:#fff;background:#2E8B9A;padding:2px 7px;border-radius:5px}
.cname{font-weight:700;color:#0D4A55;font-size:15px}.cmeta{margin-left:auto;font-size:12px;color:#7a8a8c}
.caret{transition:.2s;color:#7a8a8c}.ccard.open .caret{transform:rotate(180deg)}
.ccard-b{display:none;padding:0 15px 15px;font-size:13px}.ccard.open .ccard-b{display:block}
.meta-line{font-size:11.5px;color:#777;background:#f4f8f9;border-left:3px solid #2E8B9A;padding:5px 9px;margin-bottom:9px;border-radius:0 4px 4px 0}
.def,.sec,.row2,.note,.sample{margin:7px 0}

.note{background:#fbf8f1;padding:7px 10px;border-radius:6px}
.sample{background:#eef6f7;padding:7px 10px;border-radius:6px;font-size:12px;color:#33484b}.sample b{color:#2E8B9A}
.sccard{background:#fff;border-radius:9px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.dl{display:flex;gap:8px;margin:5px 0;font-size:13px}
.dl .rl{font-weight:700;min-width:42px}.dl.c .rl{color:#8a6d2b}.dl.s .rl{color:#2E8B9A}
.dl.c .tx{color:#444}.dl.s .tx{color:#1a2526}
.tm{display:inline-block;background:#fff;border:1px solid #dde5e7;border-radius:6px;padding:4px 9px;margin:3px;font-size:12px}
.tm b{color:#2E8B9A}
.empty{text-align:center;color:#8a9a9c;padding:30px}
@media(max-width:640px){.two{grid-template-columns:1fr}}
