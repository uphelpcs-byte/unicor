<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>유니코 도어록 모델 매뉴얼 뷰어</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Malgun Gothic', '맑은 고딕', system-ui, sans-serif;
      background: #eef2f3;
      color: #1a2526;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eef2f3;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: linear-gradient(135deg, #0d4a55, #2e8b9a);
      color: #fff;
      gap: 16px;
    }

    .top h1 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
    }

    .top p {
      margin: 0;
      opacity: 0.92;
      font-size: 13px;
      max-width: 44rem;
    }

    .menu-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 20px;
      transition: background .2s ease, transform .2s ease;
    }

    .menu-toggle:hover {
      background: rgba(255,255,255,.18);
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid #d6dee0;
      background: #fff;
      min-height: 0;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 20px 6px;
      border-bottom: 1px solid #eef2f3;
      font-size: 13px;
      font-weight: 700;
      color: #0d4a55;
      letter-spacing: .02em;
    }

    .menu-list {
      list-style: none;
      margin: 0;
      padding: 0 0 20px;
    }

    .menu-item {
      border-bottom: 1px solid #eef2f3;
    }

    .menu-button {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-left: 4px solid transparent;
      background: transparent;
      text-align: left;
      color: #1a2526;
      font-size: 14px;
      line-height: 1.5;
      transition: background .2s ease, border-color .2s ease;
    }

    .menu-button:hover,
    .menu-button.active {
      background: #f1f7f8;
      border-color: #2e8b9a;
    }

    .item-subtitle {
      margin: 8px 0 0;
      padding: 0 20px 16px;
      color: #5a6c70;
      font-size: 12px;
      line-height: 1.5;
    }

    .item-label {
      font-weight: 700;
      color: #0d4a55;
    }

    .mobile-note {
      display: none;
      padding: 12px 20px 18px;
      font-size: 12px;
      color: #566873;
    }

    .content {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #f7fafb;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px;
      border-bottom: 1px solid #dbe8eb;
      background: #fff;
    }

    .current-label {
      font-size: 14px;
      color: #0d4a55;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      background: #0d4a55;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      border: none;
    }

    .button:hover {
      background: #16697a;
    }

    .iframe-frame {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #dfe8ea;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      min-height: 520px;
      background: #fff;
    }

    .footer-note {
      padding: 16px 20px 24px;
      color: #5a6e73;
      font-size: 13px;
      background: #fff;
      border-top: 1px solid #eef2f3;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: min(84vw, 320px);
        max-width: 320px;
        height: 100vh;
        transform: translateX(-100%);
        transition: transform .25s ease;
        z-index: 12;
        box-shadow: 12px 0 40px rgba(0,0,0,.12);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .mobile-note {
        display: block;
      }

      .content {
        position: relative;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 8;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top">
      <div>
        <h1>🔐 유니코 도어록 모델 매뉴얼 뷰어</h1>
        <p>여러 모델 매뉴얼 HTML을 iframe으로 분리하여 안전하고 빠르게 확인합니다.</p>
      </div>
      <button id="menuToggle" class="menu-toggle" aria-expanded="false" aria-controls="sidebar">☰</button>
    </header>

    <div class="layout">
      <aside id="sidebar" class="sidebar" role="navigation" aria-label="모델 매뉴얼 메뉴">
        <div class="sidebar-header">매뉴얼 소스 선택</div>
        <ul class="menu-list" id="menuList"></ul>
        <div class="mobile-note">모바일에서는 상단 메뉴 버튼으로 사이드바를 열고 닫으세요.</div>
      </aside>

      <main class="content">
        <div class="toolbar">
          <div class="current-label">현재 매뉴얼: <strong id="currentLabel">로드 중...</strong></div>
          <a id="openNewTab" class="button" target="_blank" rel="noopener noreferrer">새 탭에서 열기</a>
        </div>
        <div class="iframe-frame">
          <iframe id="manualFrame" sandbox="allow-scripts allow-same-origin allow-forms" title="유니코 도어록 모델 매뉴얼"></iframe>
        </div>
        <div class="footer-note">
          선택한 매뉴얼이 iframe으로 격리되어 표시됩니다. 내부에서 모델 전환이나 내용 검색이 가능합니다.
        </div>
      </main>
    </div>
  </div>

  <script>
    const manuals = [
      {
        key: 'model-usage',
        label: '기본 모델 매뉴얼',
        description: '6700 · 7100 · 3200 · 6100 · 6400 · 200',
        src: '/manuals/model-usage.html'
      },
      {
        key: 'additional-model-usage',
        label: '추가 모델 매뉴얼',
        description: 'B100 · 7200 · 7300 · 8000FS · APP',
        src: '/manuals/additional-model-usage.html'
      },
      {
        key: 'ur-un-tp-lockkey-security',
        label: 'UR / UN / TP / 락카키 / 보안모드 매뉴얼',
        description: 'UR500 · UN317 · UN325 · UN220 · TP8000U · LOCKAKEY · SECMODE',
        src: '/manuals/ur-un-tp-lockkey-security.html'
      }
    ];

    const menuList = document.getElementById('menuList');
    const iframe = document.getElementById('manualFrame');
    const currentLabel = document.getElementById('currentLabel');
    const openNewTab = document.getElementById('openNewTab');
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');

    function createMenu() {
      manuals.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'menu-item';

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'menu-button';
        button.dataset.src = item.src;
        button.dataset.key = item.key;
        button.textContent = item.label;
        button.addEventListener('click', () => selectManual(item.key));

        const subtitle = document.createElement('div');
        subtitle.className = 'item-subtitle';
        subtitle.innerHTML = item.description;

        li.appendChild(button);
        li.appendChild(subtitle);
        menuList.appendChild(li);
      });
    }

    function selectManual(key) {
      const selected = manuals.find(item => item.key === key) || manuals[0];
      const buttons = menuList.querySelectorAll('.menu-button');

      buttons.forEach(button => {
        button.classList.toggle('active', button.dataset.key === selected.key);
      });

      currentLabel.textContent = `${selected.label} (${selected.description})`;
      iframe.src = selected.src;
      openNewTab.href = selected.src;
      history.replaceState(null, '', `#${selected.key}`);

      if (window.innerWidth <= 960) {
        sidebar.classList.remove('open');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
    }

    function initFromHash() {
      const hashKey = location.hash.slice(1);
      const found = manuals.some(item => item.key === hashKey);
      selectManual(found ? hashKey : manuals[0].key);
    }

    menuToggle.addEventListener('click', () => {
      const isOpen = sidebar.classList.toggle('open');
      menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 960) {
        sidebar.classList.remove('open');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
    });

    createMenu();
    initFromHash();
  </script>
</body>
</html>
